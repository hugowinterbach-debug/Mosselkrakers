<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mosselkraker Lookup</title>

<style>
:root{
    --primary:#2563eb;
    --danger:#dc2626;
    --border:#e5e7eb;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    margin:0;
    padding:15px;
    background:#f8fafc;
    color:#1e293b;
}

.container{
    max-width:700px;
    margin:0 auto;
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#0f172a;
}

.card{
    background:white;
    padding:15px;
    border-radius:10px;
    box-shadow:0 1px 3px rgba(0,0,0,.1);
    margin-bottom:15px;
}

.btn{
    padding:10px 14px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:600;
    font-size:14px;
}

.btn-primary{background:#2563eb;color:white;}
.btn-danger{background:#dc2626;color:white;}

input,select{
    padding:10px;
    border:1px solid var(--border);
    border-radius:6px;
    font-size:14px;
    width:100%;
    box-sizing:border-box;
}

.controls{
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:10px;
    margin-bottom:15px;
}

.tool-actions{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.tool-actions .btn{
    width:100%;
}

.collapsible-header{
    background:#e2e8f0;
    padding:12px;
    font-weight:bold;
    display:flex;
    justify-content:space-between;
    align-items:center;
    cursor:pointer;
}

.collapsible-content.hidden{
    display:none;
}

.list-item{
    padding:12px 15px;
    border-bottom:1px solid var(--border);
}

.list-item:last-child{
    border-bottom:none;
}

@media(max-width:600px){
    .controls{grid-template-columns:1fr;}
    .tool-actions{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="container">

<h2>🔎 Mosselkraker Lookup</h2>

<div class="card">
    <div class="tool-actions">

        <input type="file"
               id="excel-file"
               accept=".csv,.txt"
               onchange="uploadCSV()"
               style="display:none;">

        <button class="btn btn-primary"
                onclick="document.getElementById('excel-file').click()">
            📤 Upload Master Sheet
        </button>

        <button class="btn btn-danger"
                onclick="clearAll()">
            🗑️ Clear All Entries
        </button>

    </div>
</div>

<div class="controls">
    <input type="text"
           id="search-box"
           placeholder="🔍 Search by name..."
           oninput="renderList()">

    <select id="sort-option" onchange="renderList()">
        <option value="name-az">Sort: Name (A-Z)</option>
        <option value="pin-asc">Sort: PIN (Ascending)</option>
    </select>
</div>

<div class="card" style="padding:0;overflow:hidden;">
    <div class="collapsible-header" onclick="toggleList()">
        <span>Lookup Records • <span id="record-count">0</span></span>
        <span id="collapse-arrow">▼</span>
    </div>
    <div id="list-container" class="collapsible-content"></div>
</div>

</div>

<script>
let records = JSON.parse(localStorage.getItem('lookupRecords')) || [];
let isCollapsed = false;

function clearAll(){
    if(confirm("Wipe all active entries?")){
        records = [];
        saveToStorage();
        renderList();
    }
}

function uploadCSV(){
    const fileInput = document.getElementById('excel-file');
    const files = fileInput.files;

    if(!files || files.length === 0) return;

    const reader = new FileReader();

    reader.onload = function(e){
        try{
            const text = e.target.result;
            const newRecords = [];

            let delimiter = ",";

            if(text.includes(";")){
                delimiter = ";";
            } else if(text.includes("\t")){
                delimiter = "\t";
            }

            const lines = text.split(/[\r\n]+/);

            lines.forEach(rowText => {
                if(!rowText.trim()) return;

                const cells = rowText
                    .split(delimiter)
                    .map(cell => cell.replace(/^["']|["']$/g, '').trim());

                if(cells.length >= 2){
                    const cellName = cells[0];
                    const cellPinRaw = cells[1];

                    if(cellName.toUpperCase() === "NAME") return;

                    const targetPin = parseInt(cellPinRaw);

                    if(cellName !== ""){
                        newRecords.push({
                            name: cellName,
                            pin: isNaN(targetPin) ? 0 : targetPin
                        });
                    }
                }
            });

            records = newRecords;
            saveToStorage();
            renderList();

            alert(`Successfully loaded ${newRecords.length} records.`);

        } catch(err){
            alert("Error parsing file: " + err.message);
        }

        fileInput.value = "";
    };

    reader.readAsText(files[0]);
}

function saveToStorage(){
    localStorage.setItem('lookupRecords', JSON.stringify(records));
}

function toggleList(){
    const container = document.getElementById('list-container');
    const arrow = document.getElementById('collapse-arrow');

    isCollapsed = !isCollapsed;

    if(isCollapsed){
        container.classList.add('hidden');
        arrow.innerText = "▲";
    } else {
        container.classList.remove('hidden');
        arrow.innerText = "▼";
    }
}

function renderList(){
    const searchVal = document.getElementById('search-box').value.toLowerCase();
    const sortVal = document.getElementById('sort-option').value;
    const listContainer = document.getElementById('list-container');

    document.getElementById('record-count').innerText = records.length;

    let processedList = [...records];

    if(searchVal){
        processedList = processedList.filter(item =>
            item.name.toLowerCase().includes(searchVal)
        );
    }

    if(sortVal === 'name-az'){
        processedList.sort((a,b)=>a.name.localeCompare(b.name));
    } else if(sortVal === 'pin-asc'){
        processedList.sort((a,b)=>a.pin-b.pin);
    }

    listContainer.innerHTML = "";

    if(processedList.length === 0){
        listContainer.innerHTML =
            '<div style="padding:15px;text-align:center;color:#64748b;">No records found</div>';
        return;
    }

    processedList.forEach(item => {
        const div = document.createElement('div');
        div.className = 'list-item';
        div.innerHTML = `<strong>${item.name}</strong><span style="float:right;color:#64748b;">PIN: ${item.pin}</span>`;
        listContainer.appendChild(div);
    });
}

renderList();
</script>

</body>
</html>
