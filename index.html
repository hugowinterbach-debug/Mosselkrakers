<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mosselkraker Golf Club - Member PIN Lookup</title>
<style>
:root{
    --green:#1b5e20;
    --green-dark:#124017;
    --gold:#c9a227;
    --danger:#8b1e1e;
    --border:#d7dccf;
    --bg:#f5f7f2;
    --surface:#ffffff;
    --surface-soft:#e8efe4;
    --text:#1f2937;
    --muted:#6b7280;
    --shadow:0 1px 3px rgba(0,0,0,.08);
    --header-shadow:0 3px 10px rgba(0,0,0,.15);
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    margin:0;
    padding:20px;
    background:var(--bg);
    color:var(--text);
}

body.dark-mode{
    --bg:#101814;
    --surface:#18231d;
    --surface-soft:#243529;
    --text:#f1f5f2;
    --muted:#b7c4bb;
    --border:#38513f;
    --green:#2f7d38;
    --green-dark:#153b20;
    --danger:#a73a3a;
    --shadow:0 1px 3px rgba(0,0,0,.3);
    --header-shadow:0 3px 12px rgba(0,0,0,.35);
}

.container{
    max-width:800px;
    margin:0 auto;
}

#theme-toggle{
    position:fixed;
    top:14px;
    right:14px;
    z-index:10;
    width:42px;
    height:42px;
    border:none;
    border-radius:50%;
    background:var(--surface);
    color:var(--text);
    box-shadow:var(--shadow);
    cursor:pointer;
    font-size:20px;
}

.header{
    background:linear-gradient(135deg,var(--green),var(--green-dark));
    color:white;
    text-align:center;
    padding:24px;
    border-radius:14px;
    margin-bottom:15px;
    box-shadow:var(--header-shadow);
}

.header h1{
    margin:0;
    font-size:30px;
}

.header p{
    margin:8px 0 0;
    color:#f3f4f6;
}

.info-bar{
    display:grid;
    grid-template-columns:1fr;
    gap:12px;
    margin-bottom:15px;
}

.info-card{
    background:var(--surface);
    border-left:5px solid var(--gold);
    padding:12px;
    border-radius:10px;
    box-shadow:var(--shadow);
}

.card{
    background:var(--surface);
    padding:15px;
    border-radius:10px;
    box-shadow:var(--shadow);
    margin-bottom:15px;
}

.btn{
    padding:11px 14px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
    color:white;
}

.btn-primary{background:var(--green);}
.btn-danger{background:var(--danger);}

.tool-actions{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.tool-actions .btn{width:100%;}

input,select{
    width:100%;
    padding:11px;
    border:1px solid var(--border);
    border-radius:8px;
    box-sizing:border-box;
    background:var(--surface);
    color:var(--text);
}

.controls{
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:10px;
    margin-bottom:15px;
}

.lookup-header{
    background:var(--surface-soft);
    padding:12px;
    font-weight:bold;
    display:flex;
    justify-content:space-between;
    cursor:pointer;
}

.hidden{display:none;}

.list-item{
    padding:12px 15px;
    border-bottom:1px solid var(--border);
}

.list-item:last-child{
    border-bottom:none;
}

.pin{
    float:right;
    color:var(--muted);
}

.empty-state{
    padding:15px;
    text-align:center;
    color:var(--muted);
}

@media(max-width:700px){
    body{
        padding:10px;
    }

    #theme-toggle{
        top:8px;
        right:8px;
        width:36px;
        height:36px;
        font-size:17px;
    }

    .header{
        padding:14px 42px 12px;
        border-radius:10px;
        margin-bottom:8px;
    }

    .header h1{
        font-size:22px;
        line-height:1.15;
    }

    .header p{
        margin-top:4px;
        font-size:14px;
    }

    .info-bar,.card,.controls{
        margin-bottom:8px;
    }

    .info-card,.card{
        padding:9px;
        border-radius:8px;
    }

    .controls{
        grid-template-columns:1fr;
        gap:8px;
    }

    .tool-actions{
        grid-template-columns:1fr 1fr;
        gap:8px;
    }

    .btn{
        min-height:44px;
        padding:9px 8px;
        font-size:13px;
        line-height:1.15;
    }

    input,select{
        padding:10px;
    }

    .lookup-header,.list-item,.empty-state{
        padding:10px 12px;
    }
}
</style>
</head>
<body>

<button id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">🌙</button>

<div class="container">

<div class="header">
    <h1>⛳ Mosselkraker Golf Club</h1>
    <p>Member PIN Lookup</p>
</div>

<div class="info-bar">
    <div class="info-card">
        <strong>📅 Last Uploaded</strong><br>
        <span id="last-upload">Never</span>
    </div>
</div>

<div class="card">
    <div class="tool-actions">

        <input type="file"
               id="excel-file"
               accept=".csv,.txt"
               onchange="uploadCSV()"
               style="display:none;">

        <button class="btn btn-primary"
                onclick="document.getElementById('excel-file').click()">
            📤 Upload Master Sheet
        </button>

        <button class="btn btn-danger"
                onclick="clearAll()">
            🗑️ Clear All Entries
        </button>
    </div>
</div>

<div class="controls">
    <input type="text"
           id="search-box"
           placeholder="🔍 Search member name..."
           oninput="renderList()">

    <select id="sort-option" onchange="renderList()">
        <option value="name-az">Name A-Z</option>
        <option value="pin-asc">PIN Ascending</option>
    </select>
</div>

<div class="card" style="padding:0;overflow:hidden;">
    <div class="lookup-header" onclick="toggleList()">
        <span>Lookup Records • <span id="record-count">0</span></span>
        <span id="collapse-arrow">▼</span>
    </div>
    <div id="list-container"></div>
</div>

</div>

<script>
let records = JSON.parse(localStorage.getItem('lookupRecords')) || [];
let isCollapsed = false;

document.getElementById('last-upload').innerText =
    localStorage.getItem('lastUploadTime') || 'Never';

function saveToStorage(){
    localStorage.setItem('lookupRecords', JSON.stringify(records));
}

function clearAll(){
    if(confirm('Wipe all active entries?')){
        records = [];
        saveToStorage();
        renderList();
    }
}

function uploadCSV(){
    const fileInput = document.getElementById('excel-file');
    if(!fileInput.files.length) return;

    const reader = new FileReader();

    reader.onload = function(e){
        try{
            const text = e.target.result;
            const newRecords = [];

            let delimiter = ',';
            if(text.includes(';')) delimiter=';';
            else if(text.includes('\t')) delimiter='\t';

            const lines = text.split(/[\r\n]+/);

            lines.forEach(line=>{
                if(!line.trim()) return;

                const cells=line.split(delimiter)
                .map(c=>c.replace(/^[\"']|[\"']$/g,'').trim());

                if(cells.length<2) return;

                const name=cells[0];
                const pin=parseInt(cells[1]);

                if(name.toUpperCase()==='NAME') return;

                newRecords.push({
                    name:name,
                    pin:isNaN(pin)?0:pin
                });
            });

            records=newRecords;

            const stamp=new Date().toLocaleString();
            localStorage.setItem('lastUploadTime',stamp);
            document.getElementById('last-upload').innerText=stamp;

            saveToStorage();
            renderList();

            alert('Successfully loaded '+newRecords.length+' records.');

        }catch(err){
            alert(err.message);
        }

        fileInput.value='';
    };

    reader.readAsText(fileInput.files[0]);
}
function toggleTheme() {
    document.body.classList.toggle('dark-mode');

    const isDark =
        document.body.classList.contains('dark-mode');

    localStorage.setItem('theme',
        isDark ? 'dark' : 'light');

    document.getElementById('theme-toggle').textContent =
        isDark ? '☀️' : '🌙';
}

function applySavedTheme(){
    const savedTheme = localStorage.getItem('theme');
    const isDark = savedTheme === 'dark';

    document.body.classList.toggle('dark-mode', isDark);
    document.getElementById('theme-toggle').textContent =
        isDark ? '☀️' : '🌙';
}

function toggleList(){
    const list=document.getElementById('list-container');
    const arrow=document.getElementById('collapse-arrow');

    isCollapsed=!isCollapsed;

    if(isCollapsed){
        list.classList.add('hidden');
        arrow.innerText='▲';
    }else{
        list.classList.remove('hidden');
        arrow.innerText='▼';
    }
}

function renderList(){

    const search=document.getElementById('search-box').value.toLowerCase();
    const sort=document.getElementById('sort-option').value;
    const container=document.getElementById('list-container');
    let filtered=[...records];

    if(search){
        filtered=filtered.filter(r=>r.name.toLowerCase().includes(search));
    }

    if(sort==='name-az'){
        filtered.sort((a,b)=>a.name.localeCompare(b.name));
    }else{
        filtered.sort((a,b)=>a.pin-b.pin);
    }

    document.getElementById('record-count').innerText=filtered.length;

    container.innerHTML='';

    if(filtered.length===0){
        container.innerHTML='<div class="empty-state">No records found</div>';
        return;
    }

    filtered.forEach(item=>{
        const div=document.createElement('div');
        div.className='list-item';
        div.innerHTML='<strong>'+item.name+'</strong><span class="pin">PIN: '+item.pin+'</span>';
        container.appendChild(div);
    });
}

applySavedTheme();
renderList();
</script>

</body>
</html>
